# RIO 2017 Logistics Simulation - ABC Carrier Resource Model (S1 456)
# Entity flow:
# OrderGenerator -> ApprovalDelay -> DispatchDelay -> CarrierBranch
# -> CarrierA/B/C Queue -> Seize Resource -> Carrier Service Delay -> Release Resource
# -> DeliveryTransitDelay -> TotalSystemTime -> DeliveredOrders

Define LogNormalDistribution { ApprovalDist DispatchDist TransitDist }
Define WeibullDistribution { ArrivalDist }
Define DiscreteDistribution { CarrierChoiceDist }
Define Branch { CarrierBranch }
Define EntityDelay { ApprovalDelay DispatchDelay CarrierAService CarrierBService CarrierCService DeliveryTransitDelay }
Define EntityGenerator { OrderGenerator }
Define EntitySink { DeliveredOrders }
Define Queue { CarrierAQueue CarrierBQueue CarrierCQueue }
Define Resource { CarrierAResource CarrierBResource CarrierCResource }
Define Seize { CarrierASeize CarrierBSeize CarrierCSeize }
Define Release { CarrierARelease CarrierBRelease CarrierCRelease }
Define SimEntity { Order }
Define Statistics { TotalSystemTime }
Define ColladaModel { Axis }
Define DisplayEntity { XY-Grid XYZ-Axis }
Define OverlayClock { Clock }
Define OverlayText { Title }
Define View { View1 }

# *** UNIT TYPES ***
CarrierChoiceDist UnitType { DimensionlessUnit }
ArrivalDist UnitType { TimeUnit }
ApprovalDist UnitType { TimeUnit }
DispatchDist UnitType { TimeUnit }
TransitDist UnitType { TimeUnit }
TotalSystemTime UnitType { TimeUnit }

Simulation Description { 'RIO 2017 ABC carrier resource queue model - S1_456 capacities A=4 B=5 C=6' }

# *** DISTRIBUTIONS ***

CarrierChoiceDist RandomSeed { 5 }
CarrierChoiceDist ValueList { 1 2 3 }
CarrierChoiceDist ProbabilityList { 0.2908 0.4373 0.2719 }

ArrivalDist RandomSeed { 2 }
