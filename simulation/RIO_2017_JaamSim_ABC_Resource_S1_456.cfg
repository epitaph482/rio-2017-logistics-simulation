# *** GENERATOR AND PROCESS DELAYS ***

OrderGenerator PrototypeEntity { Order }
OrderGenerator InterArrivalTime { ArrivalDist }
OrderGenerator FirstArrivalTime { 0 d }
OrderGenerator NextComponent { ApprovalDelay }

ApprovalDelay Duration { ApprovalDist }
ApprovalDelay NextComponent { DispatchDelay }

DispatchDelay Duration { DispatchDist }
DispatchDelay NextComponent { CarrierBranch }

# *** CARRIER ROUTING ***
# CarrierChoiceDist returns 1, 2, or 3. Branch uses this value as the selected next component index.
CarrierBranch Choice { CarrierChoiceDist }
CarrierBranch NextComponentList { CarrierAQueue CarrierBQueue CarrierCQueue }

# *** CARRIER RESOURCES - S1_456 CAPACITY 4-5-6 ***
CarrierAResource Capacity { 4 }
CarrierBResource Capacity { 5 }
CarrierCResource Capacity { 6 }

# Entities are sent to the queues. Seize objects automatically take entities from their WaitQueue
# when the required resource is available.
CarrierASeize WaitQueue { CarrierAQueue }
CarrierASeize ResourceList { CarrierAResource }
CarrierASeize NextComponent { CarrierAService }

CarrierBSeize WaitQueue { CarrierBQueue }
CarrierBSeize ResourceList { CarrierBResource }
CarrierBSeize NextComponent { CarrierBService }

CarrierCSeize WaitQueue { CarrierCQueue }
CarrierCSeize ResourceList { CarrierCResource }
CarrierCSeize NextComponent { CarrierCService }

# One-day carrier handoff service slot. With capacities 3/4/5 this gives daily service capacity.
CarrierAService Duration { 1 d }
CarrierAService NextComponent { CarrierARelease }

CarrierBService Duration { 1 d }
CarrierBService NextComponent { CarrierBRelease }

CarrierCService Duration { 1 d }
CarrierCService NextComponent { CarrierCRelease }

CarrierARelease ResourceList { CarrierAResource }
CarrierARelease NextComponent { DeliveryTransitDelay }

CarrierBRelease ResourceList { CarrierBResource }
CarrierBRelease NextComponent { DeliveryTransitDelay }

CarrierCRelease ResourceList { CarrierCResource }
CarrierCRelease NextComponent { DeliveryTransitDelay }

# *** TRANSIT AND OUTPUT ***

DeliveryTransitDelay Duration { TransitDist }
DeliveryTransitDelay NextComponent { TotalSystemTime }

TotalSystemTime SampleValue { this.obj.StateTimes("None") }
TotalSystemTime NextComponent { DeliveredOrders }

